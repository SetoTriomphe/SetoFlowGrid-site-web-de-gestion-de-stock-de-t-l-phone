<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Seto FlowGrid</title>
    <link rel="stylesheet" href="style.css"> <!-- On réutilise ton CSS -->
</head>
<body>
    <div class="container" style="max-width: 600px; margin: 50px auto; padding: 20px;">
        <h2>👤 Informations de l'utilisateur</h2>
        <p style="color: #00ff88; font-weight: bold;"> Gestion de Vente de Téléphones</p>
        <hr style="opacity: 0.2; margin: 20px 0;">

        <!-- Zone où les infos vont s'afficher -->
        <div id="affichageProfil" style="line-height: 2;">
            <!-- Rempli par JavaScript -->
        </div>

        <br>
        <a href="lecontenu.html" style="color: #00ffff; text-decoration: none; font-weight: bold;"> Retour au tableau de bord</a>
    </div>

    <!-- On crée un petit script juste pour cette page -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const session = JSON.parse(localStorage.getItem('sessionActuelle'));
            const zone = document.getElementById('affichageProfil');

            if (session) {
                zone.innerHTML = `
                    <p><strong>Nom de l'entreprise :</strong> ${session.nomEntreprise}</p>
                    <p><strong>Date de création :</strong> ${session.dateCreation}</p>
                    <p><strong>Téléphone :</strong> ${session.telephone}</p>
                    <p><strong>Email :</strong> ${session.email}</p>
                    <br>
                    <h3>Détails du Gestionnaire</h3>
                    <p><strong>Nom complet :</strong> ${session.prenom} ${session.nom}</p>
                    <p><strong>Poste :</strong> ${session.posteNom}</p>
                    <p><strong>Date de naissance :</strong> ${session.dateNaissance}</p>
                `;
            } else {
                zone.innerHTML = "<p style='color: orange;'>Aucun utilisateur connecté.</p>";
            }
        });
    </script>
</body>
</html>
